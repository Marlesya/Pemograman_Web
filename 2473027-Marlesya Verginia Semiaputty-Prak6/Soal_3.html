<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473027-Marlesya Verginia Semiaputty</title>
    <style>
        .konteiner{
            width:800px;
            height: 600px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        table{
            border-spacing: 3px;
        }
        td{
            width: 40px;
            height: 40px;
            background-color: rgb(255, 217, 0);
        }
        .kosong{
            background-color: transparent;
        }
    </style>
</head>
<body>
    Tinggi Piramida: 
    <input type="text" id="tinggi"><br>
    <button onclick="buatPiramida()">proses</button>

    <div class="konteiner">
        <table id="piramid"></table>
    </div>

    <script>
        function buatPiramida() {
            let tinggi = parseInt(document.getElementById("tinggi").value);
            let tabel = document.getElementById("piramid");

            if (isNaN(tinggi)){
                alert("input harus angka");
                return;
            }

            for (let baris = 1; baris <= tinggi; baris++){
                let row = "<tr>";
                    
                    for (let spasi = 1; spasi <= tinggi - baris; spasi++){
                        row += "<td class='kosong'></td>";
                    }
                    for (let kotak = 1; kotak <= (2 * baris -1); kotak++){
                        row += "<td></td>";
                    }
                    for (let spasi = 1; spasi <= tinggi - baris; spasi++){
                        row += "<td class='kosong'></td>"
                    }
                    row += "</tr>";
                    tabel.innerHTML += row;
            }
        }
    </script>
</body>
</html>
