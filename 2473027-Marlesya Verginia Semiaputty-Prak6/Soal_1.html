<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473027-Marlesya Verginia Semiaputty</title>
    <style>
    table{
        border-collapse: collapse;
        cellpadding: 10;
    }
    td {

        border: 3px solid black;
        width: 50px;
        height: 50px;
        text-align: center;
    }
    </style>
</head>
<body>
    Angka Pertama:
    <input type="text" id="num1"><br><br>
    Angka Kedua:
    <input type="text" id="num2"><br><br>

    <button onclick="hitung()">Count</button><br>
    <table>
        <tr>
            <td id="angka1"></td>
            <td><h2>+</h2></td>
            <td id="angka2"></td>
            <td><h2>=</h2></td>
            <td id="hasilPenambahan"></td>
        </tr>
        <tr>
            <td id="number1"></td>
            <td><h2>-</h2></td>
            <td id="number2"></td>
            <td><h2>=</h2></td>
            <td id="hasilPengurangan"></td>
        </tr>
    </table>

    <script>
        function hitung(){
            let x = document.getElementById("num1").value;
            let y = document.getElementById("num2").value;
            let a = parseInt(x);
            let b = parseInt(y);

            if (isNaN(a) && isNaN(b)) {
                alert ("angka pertama dan kedua bukan angka")
            } else if (isNaN(a)) {
                alert ("angka pertama bukan angka")
            } else if (isNaN(b)) {
                alert ("angka kedua bukan angka")
            } else {
                document.getElementById("angka1").innerHTML = a;
                document.getElementById("angka2").innerHTML = b;
                document.getElementById("hasilPenambahan").innerHTML = a + b;
                document.getElementById("number1").innerHTML=a;
                document.getElementById("number2").innerHTML =b;
                document.getElementById("hasilPengurangan").innerHTML = a -b;
            }
        }
    </script>
</body>
</html>
