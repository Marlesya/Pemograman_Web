<!DOCTYPE HTML>

<html>
    <head>
        <title>2473027-Marlesya Verginia Semiaputty</title>
    </head>

    <body>
        <form>
            <table style="border: 1px solid black" cellpadding="5" width="350">
                <tr>
                    <td colspan="2">
                        <h1><b>Form Tambah User</b></h1>
                    </td>
                </tr>
                <tr>
                    <td>Name :</td>
                    <td>
                        <input type="text" name="name" required 
                        oninvalid="this.setCustomValidity('Name is required!!!')" 
                        oninput="this.setCustomValidity('')">
                    </td>
                </tr>
                <tr>
                    <td>Address :</td>
                    <td>
                        <input type="text" name="address" required
                        oninvalid="this.setCustomValidity('Address is required!!!')"
                        oninput="this.setCustomValidity('')">
                    </td>
                </tr>

                <tr>
                    <td>Email :</td>
                    <td>
                        <input type="email" id="email" required
                        oninvalid="if(this.value==''){
                            this.setCustomValidity('Harap isi bidang ini.');
                        }else{
                            this.setCustomValidity('Sertakan @ pada alamat email ini. '+this.value+' tidak memiliki @');
                        }"
                        oninput="this.setCustomValidity('')">
                    </td>
                </tr>

                <tr>
                    <td>Home Page :</td>
                    <td>
                        <input type="url" name="Home Page">
                    </td>
                </tr>

                <tr>
                    <td>Birthday :</td>
                    <td>
                        <input type="date" name="birthday">
                    </td>
                </tr>

                <tr>
                    <td>Favorit Color :</td>
                    <td>
                        <input type="color" name="color">
                    </td>
                </tr>

                <tr>
                    <td>IPK :</td>
                        <td>
                            <input type="number" min="0" max="4" step="0.1" value="0">
                        </td>
                </tr>

                <tr>
                    <td>Phone Number :</td>
                    <td>
                        <input type="tel" name="phone" 
                        pattern="[0-9]{3}-[0-9]{7,10}"
                        title="###-####### sampai ###-###########">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="right">
                        <input type="submit" value="add">
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
