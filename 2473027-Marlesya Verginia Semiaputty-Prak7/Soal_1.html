<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473027-Marlesya Verginia Semiaputty</title>
    <style>
        .konteiner{
        width: 310px;
        padding: 15px;
        position: relative;
        }
        label{
            display: inline-block;
            width: 80px;
            vertical-align:top;
        }
        textarea{
           width: 200px;
           height: 100px;
           vertical-align: top; 
        }
        input[type="text"]:not(.counter) {
            width: 200px;
        }
        .counter {
            width: 60px;
            position: absolute;
            right: 20px;
            bottom: 20px;
            text-align: right;
        }
        
    </style>

    <script>
        function call_onKeyPress(ob){
            let obval=ob.value;

            if(obval.length > 256){
                obval=obval.substr(0, 256);
                ob.value = obval;
            }
            document.getElementById("txt2").value = obval.length+"/256";
        }
    </script>
</head>

<body>
    <div class="konteiner">
        <div>
            <label>Judul</label>:
            <input type="text">
        </div> <br>
        <div style="position: relative;">
            <label style="vertical-align: top;">Deskripsi</label>:
            <textarea onkeyup="call_onKeyPress(this)"
            onkeydown="call_onKeyPress(this)"></textarea> <br><br><br><br>
            
            <input type="text" id="txt2" value="0/256" readonly class="counter">

        </div>
    </div>
    
</body>
</html>
