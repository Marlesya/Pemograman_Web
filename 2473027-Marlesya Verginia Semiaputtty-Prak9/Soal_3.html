<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24773027-Marlesya Verginia Semiaputty</title>

    <script src="jquery-4.0.0.min.js"></script>

    <style>
        div {
            width: 40px;
            height: 40px;
            margin: 5px;
            float: left;
            border: 2px blue solid;
            text-align: center;
        }

        .merah{
            background-color: red;
        }

        .kuning{
            background-color: yellow;
        }
    </style>

    <script>
        $(document).ready(function(){
            $("div").click(function(){
                $("div").removeClass("merah");
                $(this).addClass("merah");
            });

            $("button").click(function(){
                $("div").each(function(){
                    if($(this).hasClass("merah")){
                        return false;
                    }

                    $(this).addClass("kuning");
                });
            });
        });
    </script>
</head>
<body>
    <button>Change colors</button>
    <br><br>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</body>
</html>
