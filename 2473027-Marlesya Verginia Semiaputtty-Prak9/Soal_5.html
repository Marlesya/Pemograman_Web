<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473027-Marlesya Verginia Semiaputty</title>

    <script src="jquery-4.0.0.min.js"></script>

    <style>
        .merah{
            color:red;
        }
    </style>

    <script>
        $(document).ready(function(){
            $("#search").keyup(function(){
                $(".nama").removeClass("merah");
                let cari = $(this).val();

                $(".nama").each(function(){
                    let isi = $(this).text();

                    if(isi.includes(cari)){
                        $(this).addClass("merah");
                    }
                })
            })
        })
    </script>
</head>
<body>
    <input type="text" id="search">
    <div class="nama">Sun Microsystem</div>
    <div class="nama">Apache Software Foundation</div>
    <div class="nama">Oracle Coorporation</div>
