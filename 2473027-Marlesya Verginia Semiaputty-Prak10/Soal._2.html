<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473027-Marlesya Verginia Semiaputty</title>

    <script src="jquery.js"></script>
    <script>
        $(document).ready(function(){
            $("#look").click(function(){

                $("#hasil").html("");
                $.getJSON("json soal 2/SIJson.txt", function(data){
                    $("#hasil").append(
                        "<h1 align='center'>" + 
                            "<a href='" + data.link + "'>" + data.title + "</a>" +
                        "</h1><hr>"
                    );

                    $.each(data.items, function(index, item){
                        $("#hasil").append(
                            "<a href='" + item.link + "'>" + item.title + "</a>" +
                            "<br>" +

                            "By: " + item.author + 
                            "/ <i>" + item.published + "</i>" + "<br><br>" +

                            item.description + "<br><br>" +

                            "Universitas :" + 
                            "<a href='" + item.universitas.m + "'>" + "Click Here" + "</a>"+
                            "<br>" +
                            "Tag(s): " + item.tags + "<br><br>"
                        );
                    });
                    $("#hasil").append(
                        "@S1-SI FIT UKM"
                    );
                });
            });
        });
    </script>

    <style>
        .kotak{
            width: 350px;
            border: 1px solid black;
            padding: 10px;
            background-color: white;
            margin-bottom: 20px;
        }

        input{
            width: 300px;
            margin-bottom: 5px;
        }

        #hasil{
            width: 700px;
            border: 1px solid black;
            padding: 10px;
            background-color: white;
        }

        a{
            color: blue;
        }
    </style>
</head>
<body>
    <div class="kotak">
        <input type="text" placeholder="Title">
        <br>
        <input type="text" placeholder="Content">
        <br>
        <input type="text" placeholder="Generator">
        <br><br>

        <button id="look">
            Look
        </button>
    </div>

    <div id="hasil"></div>
    
</body>
</html>
